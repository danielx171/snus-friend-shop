name: Deploy to Vercel

on:
  push:
    branches: [main, feat/vike-migration]
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Verify Build Output
        run: |
          echo "Checking .vercel/output/ structure..."
          test -f .vercel/output/config.json || (echo "ERROR: config.json missing" && exit 1)
          test -d .vercel/output/static || (echo "ERROR: static/ missing" && exit 1)
          test -d .vercel/output/functions || (echo "ERROR: functions/ missing" && exit 1)
          echo "✓ Build Output API structure verified"

      - name: Install Vercel CLI
        run: bun add -g vercel@latest

      - name: Deploy Preview
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
